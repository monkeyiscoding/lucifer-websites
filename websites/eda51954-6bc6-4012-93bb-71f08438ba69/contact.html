<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width,initial-scale=1'>
    <title>Sharma Murti - Contact</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;line-height:1.6;color:#333;background:#f5f5f5}
        .container{max-width:800px;margin:0 auto;padding:20px}
        header{background:#2563eb;color:white;padding:20px 0;text-align:center}
        nav{background:#1e40af;padding:10px 0}
        nav a{color:white;padding:10px 20px;text-decoration:none;display:inline-block}
        nav a:hover{background:#1e3a8a}
        .content{background:white;padding:40px;margin:20px 0;border-radius:10px}
        h2{color:#2563eb;margin-bottom:20px}
        form{margin-top:30px}
        .form-group{margin-bottom:20px}
        label{display:block;margin-bottom:5px;font-weight:bold}
        input,textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:5px;font-size:1rem}
        textarea{min-height:150px}
        button{background:#2563eb;color:white;padding:15px 30px;border:none;border-radius:5px;cursor:pointer;font-size:1rem;width:100%}
        button:hover{background:#1e40af}
        .info{background:#f8f9fa;padding:20px;border-radius:8px;margin-top:30px}
        footer{background:#333;color:white;text-align:center;padding:30px;margin-top:40px}
        @media(max-width:768px){nav a{display:block;border-bottom:1px solid #1e3a8a}}
    </style>
</head>
<body>
    <header>
        <h1>Sharma Murti</h1>
    </header>
    <nav>
        <a href='home.html'>Home</a>
        <a href='about.html'>About</a>
        <a href='contact.html'>Contact</a>
    </nav>
    <div class='container'>
        <div class='content'>
            <h2>Contact Us</h2>
            <p>Get in touch with us. We'd love to hear from you!</p>
            <form onsubmit='alert(\"Thank you! We will get back to you soon.\");this.reset();return false;'>
                <div class='form-group'>
                    <label>Name</label>
                    <input type='text' required placeholder='Your name'>
                </div>
                <div class='form-group'>
                    <label>Email</label>
                    <input type='email' required placeholder='your@email.com'>
                </div>
                <div class='form-group'>
                    <label>Message</label>
                    <textarea required placeholder='Your message...'></textarea>
                </div>
                <button type='submit'>Send Message</button>
            </form>
            <div class='info'>
                <h3>Contact Information</h3>
                <p>📧 Email: info@Sharma Murti.com</p>
                <p>📞 Phone: +1 (555) 123-4567</p>
                <p>📍 Location: Your City, Country</p>
            </div>
        </div>
    </div>
    <footer>
        <p>&copy; 2025 Sharma Murti. All rights reserved.</p>
    </footer>
</body>
</html>
